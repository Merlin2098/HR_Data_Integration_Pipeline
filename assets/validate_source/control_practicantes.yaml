id: control_practicantes
name: Control Practicantes Bronze
file_type:
  expected_extensions:
  - .xlsx
  - .xlsm
  - .xls
sheet_rules:
  required_sheets:
  - Practicantes
  allowed_sheets:
  - Practicantes
  enforce_allowed_sheets: false
sheets:
  Practicantes:
    header_start:
      row_index_1_based: 4
      column_letter: A
    required_columns_source:
      schema_path: assets/esquemas/esquema_control_practicantes.yaml
      extract: required_columns_array
      required_columns:
      - N°
      - DNI
      - APELLIDOS Y NOMBRES
      - CONDICION
      - FECHA ING
      - F. RENOVACION
      - SEDE
      - UNIVERSIDAD
      - JEFE INMEDIATO
      - GERENCIA
